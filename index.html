<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康アドバイザー</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;



// ─── TDEE ─────────────────────────────────────────────────────
function calcTDEE(h,w,a,g,act){
  const bmr=g==="female"?10*w+6.25*h-5*a-161:10*w+6.25*h-5*a+5;
  return Math.round(bmr*({sedentary:1.2,light:1.375,moderate:1.55,active:1.725,veryactive:1.9}[act]||1.375));
}
function calcGoal(tdee,cw,gw,wks){
  const diff=cw-gw,totalKcal=diff*7200,dailyDiff=Math.round(totalKcal/(wks*7)),targetDaily=Math.round(tdee-dailyDiff);
  return{daily:targetDaily,deficit:dailyDiff,total:Math.round(totalKcal),tooAggressive:targetDaily<1200};
}

// ─── BLOOD FIELDS（元資料の基準値） ───────────────────────────
const BF=[
  {key:"glucose",    label:"空腹時血糖値",     unit:"mg/dL",ideal:"90〜100",  ph:"例: 95"},
  {key:"hba1c",      label:"HbA1C",           unit:"%",    ideal:"5.0〜5.2",ph:"例: 5.1"},
  {key:"hemoglobin", label:"ヘモグロビン",      unit:"g/dL", ideal:"13.5",    ph:"例: 13.5"},
  {key:"mcv",        label:"MCV",             unit:"fL",   ideal:"90〜95",  ph:"例: 92"},
  {key:"trig",       label:"中性脂肪",         unit:"mg/dL",ideal:"80〜100", ph:"例: 90"},
  {key:"ast",        label:"AST",             unit:"U/L",  ideal:"18〜20",  ph:"例: 19"},
  {key:"alt",        label:"ALT",             unit:"U/L",  ideal:"18〜20",  ph:"例: 18"},
  {key:"ldl",        label:"LDLコレステロール", unit:"mg/dL",ideal:"100未満", ph:"例: 95"},
];

const STAT={good:{bg:"#d4f7e0",text:"#0d6e35",label:"良好",icon:"✅",top:"#0d6e35"},caution:{bg:"#fff3cd",text:"#856404",label:"注意",icon:"⚠️",top:"#d97706"},warning:{bg:"#fde8e8",text:"#c0392b",label:"要改善",icon:"",top:"#dc2626"}};
const IS={g:{bg:"#f0fdf4",bd:"#bbf7d0",bt:"#166534"},c:{bg:"#fffbeb",bd:"#fde68a",bt:"#92400e"},w:{bg:"#fef2f2",bd:"#fca5a5",bt:"#991b1b"}};
const TABS=["血液検査","カロリー","食事・栄養","生活習慣","運動習慣","あなたについて"];

// ─── ANALYSIS ENGINE ──────────────────────────────────────────
function analyze(bv,lv,ev,pv,cv,tdee,goalCalc){
  const issues=[],diet=[],exAdv=[],lifeAdv=[],supps=[],warns=[],exProg=[];
  let wc=0,cc=0;
  const n=k=>bv[k]&&bv[k]!==""?parseFloat(bv[k]):null;
  const glucose=n("glucose"),hba1c=n("hba1c"),hemo=n("hemoglobin"),mcv=n("mcv"),
        trig=n("trig"),ast=n("ast"),alt=n("alt"),ldl=n("ldl");
  const syms=lv.symptoms||[];
  const female=pv.gender==="female"||cv.gender==="female";
  const pregnant=pv.pregnant==="yes",breastfeeding=pv.pregnant==="breastfeeding";
  const hasThyroidHx=pv.history?.includes("thyroid"),lowCarb=lv.diet==="lowcarb";
  const noAnimal=lv.animal==="none"||lv.animal==="rare";
  const takesSuppIron=lv.suppIron==="yes",takesSuppB=lv.suppB==="yes";
  const takesSuppMg=lv.suppMg==="yes",takesSuppVitC=lv.suppVitC==="yes";
  const takesSuppVitD=lv.suppVitD==="yes",takesSuppK2=lv.suppK2==="yes";
  const takesSuppZinc=lv.suppZinc==="yes",takesSuppSelen=lv.suppSelen==="yes";
  const takesSuppOmega3=lv.suppOmega3==="yes",takesSuppCoQ10=lv.suppCoQ10==="yes";
  const takesSuppAshwa=lv.suppAshwa==="yes",takesSuppCreatine=lv.suppCreatine==="yes";
  const takesSuppBCAA=lv.suppBCAA==="yes",takesSuppProb=lv.suppProb==="yes";
  const takesSuppEnzyme=lv.suppEnzyme==="yes";
  const takesSuppGinkgo=lv.suppGinkgo==="yes",takesSuppTheanine=lv.suppTheanine==="yes";
  const takesSuppTyrosine=lv.suppTyrosine==="yes",takesSuppLecithin=lv.suppLecithin==="yes";
  const takesSuppArginine=lv.suppArginine==="yes",takesSuppProtein=lv.suppProtein==="yes";
  const hasMF=lv.morningFatigue==="yes",hasDiz=lv.dizziness==="yes";
  const slowRec=ev.recovery==="slow",deskWork=ev.worktype==="desk",breathless=ev.breathless==="yes";

  // ── 空腹時血糖値（理想: 90〜100 mg/dL）────────────────────
  if(glucose!==null){
    if(glucose>110){
      wc++;
      issues.push({item:"空腹時血糖値",val:`${glucose} mg/dL`,lv:"w",
        note:`理想値（90〜100 mg/dL）を超えています。インスリン抵抗性が生じている可能性があり、慢性炎症・血管拡張→頭痛・気象病リスクにもつながります。${hasMF?" 起床時疲労とも関連します。":""}\n\nより高値（≥126 mg/dL）は医師への受診を推奨します。`});
      diet.push({icon:"",title:"血糖スパイクを防ぐ食事",
        body:"ベジファースト（野菜→タンパク→糖質の順）で食後血糖の急上昇を15〜20%抑制。精製糖・人工甘味料・清涼飲料水を避け、複合糖質へ切り替えを。\n\n地中海食パターンは複数のメタ分析でHbA1c改善に最もエビデンスが強いとされています。食物繊維（目標25〜38g/日）は腸内細菌叢を整えGLP-1分泌を促進します。",
        foods:["玄米・全粒粉（低GI）","豆類（食物繊維＋植物性タンパク）","非でんぷん野菜","青魚（抗炎症・EPA/DHA）","ナッツ類（マグネシウム源）"]});
    } else if(glucose<90){
      cc++;
      issues.push({item:"空腹時血糖値",val:`${glucose} mg/dL`,lv:"c",
        note:`理想値（90〜100 mg/dL）を下回っています。機能性低血糖→コルチゾール過剰→副腎疲労の悪循環が慢性疲労・気分の落ち込みの原因になることがあります。${hasMF?" 起床時疲労も副腎への負担を示しています。":""}`});
      diet.push({icon:"⏰",title:"血糖を安定させる食事リズム",
        body:"食事間隔を5〜6時間以内に。補食には良質な脂質＋タンパク質の組み合わせを。副腎サポートにはビタミンC・パントテン酸（B5）・マグネシウムも重要です。",
        foods:["くるみ・アーモンド","チーズ・ゆで卵","バナナ（カリウム・B6）"]});
    } else {
      issues.push({item:"空腹時血糖値",val:`${glucose} mg/dL`,lv:"g",note:"理想値（90〜100 mg/dL）内です。良好な状態です。"});
    }
  }

  // ── HbA1C（理想: 5.0〜5.2%）──────────────────────────────
  if(hba1c!==null){
    if(hba1c>5.5){
      wc++;
      issues.push({item:"HbA1C",val:`${hba1c}%`,lv:"w",
        note:`理想値（5.0〜5.2%）を大きく超えています。過去2〜3ヶ月の血糖が高い状態が続いており、糖化ストレス（タンパク質へのブドウ糖付着＝AGEs蓄積）が進行しています。AGEsは慢性炎症・老化・血管障害の原因になります。${lowCarb?" 低糖質にもかかわらず高値の場合、インスリン抵抗性が疑われます。":""}`});
    } else if(hba1c>=5.0&&hba1c<=5.2){
      issues.push({item:"HbA1C",val:`${hba1c}%`,lv:"g",note:"理想値（5.0〜5.2%）内です。血糖コントロールが最適な状態です。糖化ストレスが最小限に抑えられています。"});
    } else if(hba1c>5.2&&hba1c<=5.5){
      cc++;
      issues.push({item:"HbA1C",val:`${hba1c}%`,lv:"c",note:"理想値（5.0〜5.2%）をやや超えています。食後血糖の管理を意識し、食事の質・運動習慣を見直しましょう。"});
    } else if(hba1c<5.0){
      cc++;
      issues.push({item:"HbA1C",val:`${hba1c}%`,lv:"c",
        note:`理想値（5.0〜5.2%）を下回っています。${lowCarb?"過度な糖質制限によるグルコース不足の可能性があります。ミトコンドリアのATP産生に糖質は不可欠です。":"低栄養・慢性的な低血糖傾向の可能性があります。"}`});
    }
  }

  // ── ヘモグロビン（理想: 13.5 g/dL）──────────────────────
  // 元資料の基準値13.5を維持。世の中のデータ（性別別・死亡率最低域）を参照しつつ
  // 解説の深さで補完する
  if(hemo!==null){
    if(hemo<12.0){
      wc++;
      issues.push({item:"ヘモグロビン",val:`${hemo} g/dL`,lv:"w",
        note:`理想値（13.5 g/dL）を大きく下回り、WHO基準でも貧血域（女性<12.0 / 男性<13.0 g/dL）です。\n\n酸素運搬能の低下→ATP産生低下→全身エネルギー不足。鉄はセロトニン・ドーパミン合成の補酵素でもあり、気分・睡眠・集中力にも直結します。${breathless?" 運動中の息切れはこれが主因です。":""}${pregnant?" 妊娠中は鉄需要が通常の2倍以上に増加します。":""}\n\n【最新エビデンス】鉄サプリへのビタミンC追加は食品からの非ヘム鉄吸収には有効ですが、サプリメント単体への追加効果は2023年のRCTメタ分析（n=1,782）でHb+0.14 g/dLのみと確認されています。`});
      if(!takesSuppIron) diet.push({icon:"",title:"鉄補給の最適戦略",
        body:"ヘム鉄（動物性）の吸収率15〜35%は非ヘム鉄（植物性: 2〜8%）の約5〜10倍。\n\n【吸収を高める】空腹時または食間に摂取。非ヘム鉄は食事中の有機酸（ビタミンC・クエン酸）で吸収UP。\n【吸収を妨げる】食事中のお茶・コーヒー（タンニン）、カルシウム、フィチン酸は鉄吸収を低下させるため、食事中・食後1時間は避けましょう。\n\n銅（鉄の代謝に必須）・ビタミンB6（ヘモグロビン合成に必須）・葉酸も同時補給を。",
        foods:["レバー（週1〜2回・ヘム鉄最高）","牛赤身肉・あさり・カツオ","小松菜・ほうれん草（非ヘム鉄）","カボチャの種（銅・亜鉛源）"]});
      warns.push("鉄欠乏の連鎖：酸素不足→交感神経優位→コルチゾール過剰→副腎疲労→低血糖。激しい運動は鉄消費（溶血・汗・消化管出血）を増やすため、数値改善まで運動強度を抑えましょう。");
    } else if(hemo<13.5){
      cc++;
      issues.push({item:"ヘモグロビン",val:`${hemo} g/dL`,lv:"c",
        note:`理想値（13.5 g/dL）を下回っています。有酸素能力・持久力の低下、慢性疲労の原因になります。鉄・タンパク質・銅・B6・葉酸を総合的に補給しましょう。\n\n参考：大規模コホート研究（n=6,722）では13〜15 g/dLが死亡リスク最低域と報告されています。`});
      if(!takesSuppIron) diet.push({icon:"",title:"ヘモグロビン理想値へのアプローチ",
        body:"毎食タンパク質20〜30g＋ヘム鉄を意識して。非ヘム鉄（植物性）は調理法（炒める）で吸収率が上がります。",
        foods:["牛赤身肉・まぐろ・かつお","豆腐・納豆（非ヘム鉄）","小松菜・ブロッコリー","ひじき・あおのり"]});
    } else {
      issues.push({item:"ヘモグロビン",val:`${hemo} g/dL`,lv:"g",note:"理想値（13.5 g/dL）以上です。酸素運搬能は良好な状態です。"});
    }
  }

  // ── MCV（理想: 90〜95 fL）────────────────────────────────
  if(mcv!==null){
    if(mcv<90){
      cc++;
      issues.push({item:"MCV",val:`${mcv} fL`,lv:"c",
        note:`理想値（90〜95 fL）を下回り赤血球が小さめです。鉄欠乏性貧血のサイン（小球性貧血）。${hasDiz?" 立ちくらみ・めまいの原因にもなっています。":""}\n\nMCV 80 fL以下になると鉄欠乏がより進行しています。鉄・タンパク質の補給を優先しましょう。`});
    } else if(mcv>95&&mcv<=100){
      cc++;
      issues.push({item:"MCV",val:`${mcv} fL`,lv:"c",
        note:"理想値（90〜95 fL）の上限をやや超えています。ビタミンB12・葉酸の不足が疑われます（大球性貧血の初期段階）。神経伝達にも関わるため、運動の協調性・気分にも影響します。"});
      if(!takesSuppB) diet.push({icon:"",title:"ビタミンB12・葉酸の補給",
        body:"B12は動物性食品のみに含まれます。葉酸は緑黄色野菜に豊富。どちらも赤血球の核酸合成に必須で、神経系の機能維持にも重要です。",
        foods:["レバー・しじみ・牡蠣（B12）","卵・乳製品（B12）","ほうれん草・枝豆・アスパラ（葉酸）"]});
    } else if(mcv>100){
      wc++;
      issues.push({item:"MCV",val:`${mcv} fL`,lv:"w",
        note:`理想値（90〜95 fL）を大きく超え赤血球が大きめです。B12・葉酸の著しい不足が疑われます。${noAnimal?" 動物性食品を避けている場合、B12欠乏のリスクが特に高まります。医師への相談を推奨します。":""}\n神経伝達障害・認知機能低下のリスクもあります。`});
      if(!takesSuppB) diet.push({icon:"",title:"ビタミンB12・葉酸を至急補給",
        body:"B12は動物性食品のみに含まれます。不足が進むと神経障害が不可逆的になることがあります。",
        foods:["レバー・しじみ・牡蠣（B12最高）","卵・チーズ","ほうれん草・枝豆（葉酸）"]});
    } else {
      issues.push({item:"MCV",val:`${mcv} fL`,lv:"g",note:"理想値（90〜95 fL）内です。赤血球のサイズは良好な状態です。"});
    }
  }

  // ── 中性脂肪（理想: 80〜100 mg/dL）──────────────────────
  if(trig!==null){
    if(trig<80){
      cc++;
      issues.push({item:"中性脂肪",val:`${trig} mg/dL`,lv:"c",
        note:`理想値（80〜100 mg/dL）を下回っています。低栄養・低糖質ダイエット過多・交感神経優位・甲状腺機能低下の可能性があります。\n\nATP産生不足→運動中のエネルギー切れ・倦怠感の原因に。甲状腺機能低下では無気力・むくみ・体重増加・便秘・冷えが起こりやすくなります。${lowCarb?" 過度な糖質制限が原因の可能性が高いです。":""}${hasThyroidHx?" 甲状腺疾患の既往があるため特に注意が必要です。":""}`});
      diet.push({icon:"",title:"適切な糖質エネルギーを確保する",
        body:"過度な糖質制限はATP産生不足・自律神経の乱れを招きます。1日100〜130gの糖質を確保しましょう。\n\nまた、健全な脂質代謝のためにはオメガ3系脂肪酸（EPA/DHA）の摂取も重要です。",
        foods:["さつまいも・バナナ・玄米","オートミール","青魚（EPA/DHA）"]});
    } else if(trig>150){
      wc++;
      issues.push({item:"中性脂肪",val:`${trig} mg/dL`,lv:"w",
        note:"理想値（80〜100 mg/dL）を大きく超えています。糖質・アルコールの過剰摂取が主因のことが多いです。慢性炎症・脂肪肝・インスリン抵抗性のリスクが高まります。\n\n最新エビデンス：青魚のn-3系脂肪酸（EPA/DHA）は中性脂肪を25〜30%低下させるメタ分析のデータがあります（複数のRCT）。"});
      diet.push({icon:"",title:"中性脂肪を下げる食事（エビデンスレベル高）",
        body:"果糖（清涼飲料・果物ジュース）とアルコールが特に中性脂肪を上昇させます。青魚のEPA/DHAを積極的に摂取しましょう。\n\n有酸素運動（特にHIIT）は中性脂肪を最も効率的に低下させることがネットワークメタ分析（28 RCT）で示されています。",
        foods:["さば・いわし・さんま（EPA/DHA）","えごま油・アマニ油（ALA）","くるみ","アボカド"]});
    } else if(trig>100&&trig<=150){
      cc++;
      issues.push({item:"中性脂肪",val:`${trig} mg/dL`,lv:"c",note:"理想値（80〜100 mg/dL）をやや超えています。食事内容・運動習慣を見直しましょう。"});
    } else {
      issues.push({item:"中性脂肪",val:`${trig} mg/dL`,lv:"g",note:"理想値（80〜100 mg/dL）内です。良好な状態です。"});
    }
  }

  // ── AST/ALT（理想: 18〜20 U/L）──────────────────────────
  if(ast!==null&&alt!==null){
    const bothLow=ast<16&&alt<16, altHigh=alt>ast, bigDiff=(ast-alt)>=3&&alt<ast;
    if(bothLow){
      wc++;
      issues.push({item:"AST・ALT（両方低値）",val:`AST:${ast}/ALT:${alt}`,lv:"w",
        note:`両方16未満は低タンパクの重要なサインです。AST・ALTはアミノ酸代謝酵素であり、低値は肝臓・筋肉でのタンパク質合成・代謝が低下していることを示します。${slowRec?" 運動後の回復が遅いのもこれが原因の可能性があります。":""}\n\n消化機能の低下→タンパク吸収不全も疑われます。「よく噛む」ことで消化の連鎖（咀嚼→迷走神経活性化→胃酸・膵液分泌）が始まります。`});
      diet.push({icon:"",title:"タンパク質を毎食しっかり摂る",
        body:`体重×1.2〜1.6g/日が目標（体重50kgなら60〜80g/日）。毎食20〜30g意識しましょう。\n\n消化機能が低下している場合は、よく噛む（一口20〜30回）ことと消化酵素サプリの検討も有効です。${noAnimal?" 動物性タンパクを避けている場合は大豆・豆類・ナッツ・ヘンプシードを積極的に。":""}`,
        foods:["鶏むね肉・魚","卵（完全タンパク）","木綿豆腐・納豆","ヘンプシード（全必須アミノ酸）"]});
    } else if(altHigh){
      cc++;
      issues.push({item:"ALT>AST（VB6不足・脂肪肝）",val:`AST:${ast}/ALT:${alt}`,lv:"c",
        note:"ALTの方が高い状態は隠れ脂肪肝・ビタミンB6不足のサインです。ALTは肝臓に特異的な酵素で、VB6はALTの補酵素として機能します。VB6不足→ALT活性低下→相対的にALT高値になります。\n\nVB6はタンパク代謝・セロトニン合成・グリコーゲン代謝にも必須で、不足は気分低下・PMS・免疫低下にもつながります。"});
      if(!takesSuppB) diet.push({icon:"",title:"VB6（ビタミンB6）を積極的に摂る",
        body:"VB6は水溶性で熱に弱いため、生食・軽調理で摂るのが効率的です。1日推奨量は1.0〜1.6mg（厚労省）ですが、ストレスが多い場合はより多くの需要があります。",
        foods:["かつお・まぐろ（VB6最高）","レバー・豚肉","ブロッコリー・バナナ","豆類（大豆・ひよこ豆）"]});
    } else if(bigDiff){
      cc++;
      issues.push({item:"AST-ALT差（VB6不足）",val:`AST:${ast}/ALT:${alt}`,lv:"c",
        note:"ASTとALTの差が3以上でALTが低い場合もVB6不足のサインです。タンパク代謝・神経機能の低下につながります。"});
      if(!diet.find(d=>d.title.includes("VB6"))&&!takesSuppB){

      body:`【改善できること】ストレス・睡眠不足・高負荷時のワーキングメモリ低下を防ぎ、集中力・認知パフォーマンスを維持します。\n理由：チロシンはドーパミン・ノルエピネフリン（カテコールアミン）の直接前駆体です。慢性ストレスでカテコールアミンが枯渇すると認知機能が低下しますが、チロシンを補給することで産生を維持できます。\n\n【エビデンス】複数のRCTでストレス・睡眠不足・寒冷環境下でのワーキングメモリ維持を確認。米陸軍・米海軍SERE訓練での極限環境下での認知維持に有効性を確認。\n⚠️ 通常状態・低ストレス時での効果は限定的。高齢者での高用量は逆効果の可能性（逆U字カーブ）あり。\n\n【推奨用量】500〜2,000mg（作業・運動1〜2時間前・空腹時）\n⚠️ 甲状腺疾患がある場合は必ず医師に相談（甲状腺ホルモンの前駆体）`});
  }

  // レシチン（未摂取 & ALT>AST or 高LDL or 消化症状）
  if(!takesSuppLecithin){
    const lecithinNeeded=(ast!==null&&alt!==null&&alt>ast)||(ldl!==null&&ldl>=100)||syms.includes("digestion")||syms.includes("fatigue");
    if(lecithinNeeded) supps.push({icon:"",title:"レシチン（ホスファチジルコリン）（未摂取）",
      body:`【改善できること】肝臓の脂肪蓄積（脂肪肝）の改善・胆汁分泌促進・アセチルコリン産生のサポートにつながります。\n理由：ホスファチジルコリン（PC）はVLDL産生を促進して肝臓からの脂質排出を助け、脂肪肝の改善に作用します。また胆汁の主成分としても消化を助けます。\n\n【エビデンス】複数のRCT・メタ分析で肝脂肪の減少・ALT/AST改善を確認。2024年のRCTでは12週間でグレードS3脂肪肝の割合が84.6%→51.3%に改善。${ast!==null&&alt!==null&&alt>ast?" 現在のALT>ASTパターンに特に有効です。ビタミンB6との相乗効果もあります。":""}\n\n⚠️ 認知機能改善としてのサプリ効果は観察研究のみ。RCTでの確証はまだ得られていません。\n\n【推奨用量】1,200〜2,400mg/日（食事と一緒）\n食品から摂る場合：卵黄・大豆・レバー・魚卵が豊富`});
  }

  // アルギニン（未摂取 & 冷え性 or 血流 or 運動パフォーマンス）
  if(!takesSuppArginine){
    const arginineNeeded=syms.includes("cold")||syms.includes("fatigue")||ev.goal==="performance"||ev.goal==="muscle"||breathless;
    if(arginineNeeded) supps.push({icon:"",title:"L-アルギニン（またはL-シトルリン）（未摂取）",
      body:`【改善できること】末梢血流・冷え性の改善、血圧の正常化、運動パフォーマンスの向上につながります。\n理由：アルギニンは一酸化窒素（NO）合成の直接基質です。NOが血管を拡張させることで、末梢まで血液が届きやすくなります。\n\n【エビデンス】メタ分析でL-アルギニン補給による収縮期血圧の有意な低下を確認。RCT（6g単回摂取）で酸素消費量の削減・高強度運動の耐容能向上を確認。\n\n L-シトルリンの方が腸での分解が少なく、血中アルギニン濃度の上昇により有効（43研究のレビュー）。効率重視ならシトルリンが推奨。\n\n【推奨用量】L-アルギニン: 3〜6g/日 / L-シトルリン: 3〜6g/日（運動1時間前）\n⚠️ ヘルペスウイルス感染歴がある場合は控える。血圧降下薬服用中は医師に相談。`});
  }

  if(!takesSuppProtein){
    const proteinNeeded=(ast!==null&&alt!==null&&ast<16&&alt<16)||slowRec||ev.goal==="muscle"||ev.goal==="performance"||noAnimal;
    if(proteinNeeded) supps.push({icon:"",title:"プロテイン（ホエイ・カゼイン・植物性）（未摂取）",
      body:`【改善できること】タンパク質不足の解消・筋肉量の増加・運動後の回復促進につながります。${ast!==null&&alt!==null&&ast<16&&alt<16?" 現在のAST/ALT低値（低タンパク）の直接的な改善手段です。":""}${slowRec?" 運動後の回復改善に最も即効性のある方法のひとつです。":""}\n理由：タンパク質は筋肉・酵素・ホルモン・免疫抗体のすべての材料です。食事からの摂取が困難な場合、プロテインサプリは最も効率的な補給手段になります。\n\n【エビデンス】\n・ホエイ：ロイシン含量高く（約11%）mTORC1経路を最も強力に活性化。運動後30分以内の摂取で筋損傷回復・筋肥大を促進。\n・カゼイン：就寝前摂取で筋タンパク合成を8時間持続。睡眠中の成長ホルモン分泌と相乗。\n・植物性（ソイ・エンドウ・ヘンプ）：大豆プロテインはホエイと同等の筋タンパク合成効果を示すメタ分析あり。${noAnimal?" 動物性を避ける場合の最優先選択肢。":""}\n\n【推奨用量】体重×0.3〜0.4g/回（20〜40g）を運動後30分以内または就寝前\nPDCAAS/DIAASスコア1.0のものを選ぶと品質が保証されています。`});
  }

  const exFreq=parseInt(ev.frequency)||0, exType=ev.type||[];
  const exIss=ev.issues||[], lvl=ev.level, goal=ev.goal;

  if(!lifeAdv.length) lifeAdv.push({icon:"",title:"睡眠と回復の最適化",
    body:"7〜8時間の質の良い睡眠は、血糖値・コレステロール・ホルモンバランスを整える基盤です。22〜23時就寝・6〜7時起床のリズムを目指しましょう。就寝1時間前はスマホ・強い照明を避けて。"});

  let status="good",overall="バランス良好です",
      summary="血液検査値・生活習慣は全体的に良好です。以下のアドバイスを参考に更なる最適化を目指しましょう。";
  if(wc>=2){status="warning";overall="複数項目の改善が必要";
    summary=`${wc}項目で理想値から外れています。まず食事・睡眠・消化機能の改善から始めましょう。`;}
  else if(wc===1||cc>=2){status="caution";overall="注意が必要な項目あり";
    summary="いくつか気になる数値があります。食事・生活習慣を総合的に整えていきましょう。";}
  else if(cc===1){status="caution";overall="概ね良好、一部注意";
    summary="全体的には良好ですが、一部気になる数値があります。早めのケアで数値改善を目指しましょう。";}

  // ─── トレーナー向けサマリー ────────────────────────────
  const trainerNotes=[];

  if(hemo!==null&&hemo<13.5) trainerNotes.push({tag:"",category:"酸素供給・エネルギー",note:`ヘモグロビン低値（${hemo} g/dL）：酸素運搬能が低下しています。有酸素系の強度を上げると急激な疲労・息切れが出やすい状態です。低〜中強度から段階的に負荷をかけてください。鉄補給が改善するまでHIIT等の高強度インターバルは慎重に。`});
  if(glucose!==null&&glucose>100) trainerNotes.push({tag:"",category:"血糖管理",note:`空腹時血糖高値（${glucose} mg/dL）：食後30分以内の軽い有酸素が血糖スパイク抑制に有効です。HIITは血糖改善に最もエビデンスがありますが、食後2時間以上空けてから実施してください。セッション中の低血糖リスクにも注意（補食の準備を推奨）。`});
  if(glucose!==null&&glucose<90) trainerNotes.push({tag:"",category:"低血糖リスク",note:`空腹時血糖低値（${glucose} mg/dL）：機能性低血糖の可能性があります。空腹時のトレーニングは避け、セッション前に補食（炭水化物＋タンパク質）を摂るよう指導してください。運動中の低血糖症状（冷汗・震え・頭痛）に注意。`});
  if(trig!==null&&trig<80) trainerNotes.push({tag:"",category:"エネルギー貯蔵",note:`中性脂肪低値（${trig} mg/dL）：エネルギー貯蔵が少ない状態です。長時間・高強度のセッションではエネルギー切れが起きやすいため、45〜60分以内に設計してください。糖質摂取の改善と並行して進めましょう。`});
  if(trig!==null&&trig>150) trainerNotes.push({tag:"",category:"脂質代謝",note:`中性脂肪高値（${trig} mg/dL）：中強度有酸素（最大心拍数60〜70%・週150分以上）を優先したプログラムが効果的です。筋トレとの組み合わせも有効。心拍数の目安：(220-年齢)×0.6〜0.7。`});
  if(ast!==null&&alt!==null&&ast<16&&alt<16) trainerNotes.push({tag:"",category:"回復・修復能力",note:`AST/ALT両方低値（AST:${ast}/ALT:${alt}）：低タンパクのサインです。筋損傷からの回復が著しく遅い可能性があります。高ボリューム・高強度は控え、回復最優先で設計してください。運動後30分以内のタンパク質補給を強く推奨。セッション頻度は週2〜3回に抑えることを推奨。`});
  if(ldl!==null&&ldl<60) trainerNotes.push({tag:"",category:"消化吸収",note:`LDL低値（${ldl} mg/dL）：消化吸収機能が著しく低下しています。運動後の栄養補給が正常に吸収されていない可能性があります。消化機能改善を先行させながらトレーニングを進めてください。`});
  if(slowRec) trainerNotes.push({tag:"",category:"回復速度",note:"運動後の回復に3日以上かかる状態です。オーバーロードのリスクが高いため、ペリオダイゼーション（強度の波）を意識した設計が重要です。HRV（心拍変動）やセルフ評価で回復を確認しながら進めてください。"});
  if(hemo!==null&&hemo<13.5&&breathless) trainerNotes.push({tag:"",category:"息切れ",note:"ヘモグロビン低値＋息切れあり：有酸素能力が著しく低下しています。会話ができる程度（RPE 11〜13）の低強度から開始し、4〜6週間かけて段階的に負荷を上げてください。"});
  if(exIss.includes("backpain")) trainerNotes.push({tag:"⚠️",category:"腰痛",note:"腰痛あり：高負荷のスクワット・デッドリフトは避け、まずブリッジ・キャットカウ・デッドバグ等の低閾値運動で多裂筋・体幹を再活性化してください。腰痛が軽減してから段階的に高負荷種目へ移行しましょう。"});
  if(exIss.includes("shoulderpain")) trainerNotes.push({tag:"⚠️",category:"肩こり・首の痛み",note:"肩こり・首の痛みあり：胸椎の可動域低下と肩甲骨周囲筋の機能不全が主因のことが多いです。オーバーヘッド種目（プレス系）は慎重に。まずフェイスプル・バンドプルアパート・胸椎ローテーションで肩甲骨の安定性を高めてください。ストレートネックの可能性もあるため、頚部ニュートラルを意識したキューイングを心がけましょう。"});
  if(exIss.includes("kneepain")) trainerNotes.push({tag:"⚠️",category:"膝・股関節の痛み",note:"膝・股関節の痛みあり：大腿四頭筋優位パターン（膝主導）が原因のことが多いです。まずグルートアクティベーション（クラムシェル・ヒップスラスト）で臀筋を活性化し、股関節主導の動作パターンを習得してください。深いスクワットやランジは痛みが軽減するまで避けましょう。ステップアップ・シングルレッグRDLで段階的に進めることを推奨します。"});
  if(exIss.includes("balance")) trainerNotes.push({tag:"⚠️",category:"バランス",note:"バランス不良：不安定環境（ボス・バランスボード）の前に、まず固定面での安定性（デッドバグ・バードドッグ）を確立してください。片脚種目は壁やTRXサポートから始めましょう。"});
  if(exIss.includes("stiffness")) trainerNotes.push({tag:"⚠️",category:"柔軟性",note:"身体が硬い：ウォームアップに動的ストレッチ（レッグスイング・ヒップサークル・胸椎ローテーション）を必ず組み込んでください。フォームローリングで筋膜リリースを先行させると効果的です。"});
  if(exIss.includes("posture")) trainerNotes.push({tag:"⚠️",category:"姿勢（猫背・前傾）",note:"姿勢不良あり：胸椎後弯（猫背）・頭部前方位・骨盤前傾または後傾のパターンを評価してください。プッシュ系（プッシュアップ・プレス）よりプル系（ロウ・フェイスプル・バンドプルアパート）を優先し、前後の筋力バランスを整えましょう。ヒンジパターン（RDL）と胸椎伸展エクササイズを序盤に重点的に組み込んでください。"});
  if(exIss.includes("weakcore")) trainerNotes.push({tag:"⚠️",category:"体幹の弱さ",note:"体幹弱化あり：高重量のコンパウンド種目の前に体幹の安定性を確立することが怪我予防の鍵です。まずダイアフラム呼吸→デッドバグ→プランク（ハードスタイル）→パリーフ式プレスの順で進めてください。腹横筋・多裂筋・横隔膜・骨盤底筋群の協調的な活性化を意識したキューイングを心がけましょう。"});
  if(exIss.includes("coordination")) trainerNotes.push({tag:"⚠️",category:"協調性・動作の精度",note:"動きのぎこちなさあり：神経筋コントロールの課題です。複雑な多関節種目の前に、単純な動作パターン（ヒンジ・スクワット・プッシュ・プル）を一つずつ丁寧に習得してください。ミラーニューロン活用のためトレーナーのデモンストレーションと言語キューの組み合わせが効果的です。スロートレーニング（エキセントリック3〜5秒）で動作の質を高めましょう。"});
  if(deskWork) trainerNotes.push({tag:"",category:"姿勢（デスクワーク）",note:"デスクワーク中心：腸腰筋の過緊張・大殿筋の抑制（lower cross syndrome）が起きやすい状態です。ヒップヒンジパターンの習得とグルートアクティベーションを序盤に重点的に行ってください。"});
  if(syms.includes("migraine")) trainerNotes.push({tag:"⚠️",category:"片頭痛",note:"片頭痛持ち：高強度運動が誘発因子になる場合があります。セッション前の水分補給を徹底し、急激な強度上昇を避けてください。低血糖も誘発因子のため補食管理を忘れずに。"});
  if(syms.includes("fatigue")) trainerNotes.push({tag:"⚠️",category:"慢性疲労",note:"慢性疲労あり：オーバートレーニングのリスクが高い状態です。初期は低〜中強度のみ。RPEを必ず確認しながら進め、疲労感が増す場合はボリュームを落としてください。セッション末に呼吸法・軽い有酸素を組み込み副交感神経を優位化してください。"});
  if(hasMF) trainerNotes.push({tag:"⚠️",category:"起床時疲労",note:"朝の疲労が残っている状態（副腎疲労の可能性）：午前中の高強度トレーニングは避け、夕方以降のセッションが推奨されます。"});
  if(goal==="diet") trainerNotes.push({tag:"",category:"目標：ダイエット",note:`TDEE: ${tdee||"未入力"} kcal/日${goalCalc?" / 目標摂取: "+goalCalc.daily+" kcal / 1日削減: "+goalCalc.deficit+" kcal":""}。\n脂肪燃焼優先順位：①HIIT（EPOC効果・24〜48時間代謝上昇）→②全身筋トレ（基礎代謝向上）→③低強度有酸素。食後15〜30分のウォーキングを習慣化してください。`});
  if(goal==="muscle") trainerNotes.push({tag:"",category:"目標：筋肥大",note:`週10〜20セット/筋肉群・1RMの60〜85%・週2回以上の同一筋群刺激が最適（メタ分析より）。\nタンパク質：体重×1.6〜2.2g/日。${ast!==null&&alt!==null&&ast<16&&alt<16?"⚠️ AST/ALT低値（低タンパク）のため消化吸収機能の改善を優先してください。":""}`});
  if(goal==="performance") trainerNotes.push({tag:"",category:"目標：競技向上",note:`ペリオダイゼーション設計を推奨。競技特異的：基礎体力＝60:40を目安に。${hemo!==null&&hemo<13.5?"⚠️ ヘモグロビン低値により有酸素パフォーマンスが制限されています。鉄補給と並行してください。":""}`});
  if(goal==="health") trainerNotes.push({tag:"",category:"目標：健康維持",note:"有酸素運動（週150分・中強度）＋筋トレ（週2〜3回）の組み合わせが血液検査値の総合的な改善に最もエビデンスが強いです。ライフスタイルに無理なく組み込める継続可能なプログラムを設計しましょう。"});
  if(!trainerNotes.length) trainerNotes.push({tag:"✅",category:"特記事項なし",note:"血液検査・身体状況ともに大きな制限はありません。目標に合わせて標準的なプログラムを設計してください。"});

  return{overall,status,summary,issues,diet,lifeAdv,supps,warns,trainerNotes};
}

// ─── PRINT HTML ───────────────────────────────────────────────
function buildPrint(res,tdee,bmi,bmiLabel,goalCalc,cv,bv,lv,ev,pv){
  const sc={good:"#0d6e35",caution:"#856404",warning:"#c0392b"};
  const sb={good:"#d4f7e0",caution:"#fff3cd",warning:"#fde8e8"};
  const sl={good:"良好",caution:"注意",warning:"要改善"};
  const ib={g:"#f0fdf4",c:"#fffbeb",w:"#fef2f2"};
  const ibd={g:"#bbf7d0",c:"#fde68a",w:"#fca5a5"};
  const ibt={g:"#166534",c:"#92400e",w:"#991b1b"};
  const chip=fs=>fs?fs.map(f=>'<span style="display:inline-block;background:#e8f5e9;border:1px solid #a5d6a7;color:#2e7d32;padding:2px 8px;border-radius:20px;font-size:11px;margin:2px">'+f+'</span>').join(""):"";
  const card=items=>items.map(item=>'<div style="border:1px solid #e8f5e9;border-radius:10px;padding:12px 14px;margin-bottom:8px;background:white"><div style="font-weight:700;color:#1b5e20;margin-bottom:6px">'+(item.icon||"")+" "+item.title+'</div><p style="font-size:13px;color:#37474f;line-height:1.8;white-space:pre-line;margin-bottom:'+(item.foods&&item.foods.length?"8px":"0")+'">'+(item.body||"")+'</p>'+(item.foods&&item.foods.length?"<div>"+chip(item.foods)+"</div>":"")+'</div>').join("");
  const sec=(label,color,html)=>html?'<div style="display:flex;align-items:center;gap:8px;margin:20px 0 10px"><div style="width:10px;height:24px;border-radius:3px;background:'+color+'"></div><h2 style="font-size:15px;font-weight:800;color:#1b5e20;margin:0">'+label+'</h2></div>'+html:"";
  const date=new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric"});

  // 月別プランHTML
  const plans=buildDietPlan(cv,bv,lv,ev,pv,res);
  const planHtml=plans&&plans.length?sec("月別プラン（食事・サプリ・生活習慣）","#43a047",
    plans.map(plan=>{
      const rows=(label,items,color)=>'<div style="background:white;border-left:3px solid '+color+';border-radius:0 10px 10px 0;padding:10px 12px;margin-bottom:6px"><div style="font-size:11px;font-weight:700;color:'+color+';margin-bottom:6px">'+label+'</div>'+
        items.map(item=>{
          const isNew=item.startsWith("[今月");
          const isCont=item.startsWith("[継続]");
          const clean=item.replace(/^\[(今月から|今月追加|継続)\]\s*/,"");
          const badge=isNew?'<span style="background:#1565c0;color:white;border-radius:3px;padding:1px 5px;font-size:10px;font-weight:700;margin-right:4px">NEW</span>':isCont?'<span style="background:#546e7a;color:white;border-radius:3px;padding:1px 5px;font-size:10px;font-weight:700;margin-right:4px">継続</span>':'<span style="color:'+color+';font-weight:700;margin-right:4px">→</span>';
          return '<div style="font-size:12px;color:#37474f;line-height:1.7;padding:3px 0;border-bottom:1px solid #f0f0f0">'+badge+clean+'</div>';
        }).join("")+'</div>';
      return '<div style="border:1.5px solid '+plan.phaseColor+'40;border-radius:12px;padding:14px;margin-bottom:12px;background:'+plan.phaseBg+'">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid '+plan.phaseColor+'30">'+
          '<div><div style="font-size:10px;font-weight:700;color:'+plan.phaseColor+'">'+plan.phase+'</div><div style="font-size:16px;font-weight:900;color:#1b5e20">'+plan.month+'ヶ月目</div></div>'+
          (plan.targetKcal?'<div style="text-align:right"><div style="font-size:10px;color:#6b7280">目標摂取</div><div style="font-size:16px;font-weight:900;color:'+plan.phaseColor+'">'+plan.targetKcal.toLocaleString()+'<span style="font-size:10px;font-weight:400"> kcal</span></div></div>':'')+
        '</div>'+
        (plan.warning?'<div style="background:#fff3cd;border-radius:8px;padding:7px 10px;margin-bottom:8px;font-size:11px;color:#856404;font-weight:600">'+plan.warning+'</div>':'')+
        (plan.personalAlerts&&plan.personalAlerts.length?'<div style="background:#fce4ec;border-radius:8px;padding:8px 10px;margin-bottom:8px"><div style="font-size:10px;font-weight:700;color:#c62828;margin-bottom:4px">あなたへの注意点</div>'+plan.personalAlerts.map(a=>'<div style="font-size:11px;color:#b71c1c;line-height:1.6">'+a+'</div>').join("")+'</div>':'')+
        rows("今月の食事",plan.diet,"#2e7d32")+
        rows("今月のサプリ",plan.supps,"#1565c0")+
        rows("今月の習慣",plan.life,"#6a1b9a")+
      '</div>';
    }).join("")
  ):"";

  const issHtml=res.issues.map(item=>'<div style="background:'+ib[item.lv]+';border:1px solid '+ibd[item.lv]+';border-radius:10px;padding:12px 14px;margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><span style="font-weight:700;color:'+ibt[item.lv]+';font-size:13px">'+item.item+'</span><span style="background:'+ibd[item.lv]+';color:'+ibt[item.lv]+';padding:2px 9px;border-radius:20px;font-size:12px;font-weight:700">'+item.val+'</span></div><p style="font-size:13px;color:#4b5563;line-height:1.7;white-space:pre-line">'+item.note+'</p></div>').join("");
  const trainerHtml=res.trainerNotes.map(n=>'<div style="background:white;border:1px solid #e8f5e9;border-left:4px solid #43a047;border-radius:0 10px 10px 0;padding:12px 14px;margin-bottom:8px"><div style="font-size:11px;font-weight:700;color:#43a047;margin-bottom:4px">'+n.tag+" "+n.category+'</div><p style="font-size:13px;color:#374151;line-height:1.8;white-space:pre-line">'+n.note+'</p></div>').join("");
  const calHtml=tdee?'<div style="background:#e8f5e9;border:1px solid #a5d6a7;border-radius:12px;padding:14px;margin-bottom:16px"><div style="font-size:11px;font-weight:700;color:#2e7d32;margin-bottom:6px">カロリー目標</div><div style="font-size:18px;font-weight:900;color:#1b5e20;margin-bottom:8px">TDEE '+tdee.toLocaleString()+' kcal / 日</div><div style="display:flex;flex-wrap:wrap;gap:6px"><span style="background:#e8f5e9;border:1px solid #a5d6a7;color:#2e7d32;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600">BMI '+bmi+' ('+bmiLabel+')</span>'+(goalCalc?'<span style="background:#e8f5e9;border:1px solid #a5d6a7;color:#1b5e20;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600">目標 '+goalCalc.daily.toLocaleString()+' kcal</span>':'')+(goalCalc?'<span style="background:#fff3e0;border:1px solid #ffcc80;color:#e65100;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600">'+(goalCalc.deficit>0?"-":"+")+Math.abs(goalCalc.deficit)+' kcal/日</span>':'')+'</div></div>':"";
  const warnsHtml=res.warns.map(w=>'<div style="background:#fff8e1;border-left:4px solid #ffc107;padding:10px 14px;margin-bottom:10px;font-size:13px;color:#795548;line-height:1.7;border-radius:0 8px 8px 0">'+w+'</div>').join("");
  const summaryHtml='<div style="border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid #e8f5e9;border-top:4px solid '+sc[res.status]+'"><div style="font-size:11px;color:#9ca3af;font-weight:600;margin-bottom:4px">総合判定</div><div style="font-size:19px;font-weight:900;color:#1b5e20;margin-bottom:6px">'+res.overall+'</div><p style="font-size:13px;color:#37474f;line-height:1.8">'+res.summary+'</p></div>';
  const sectionsHtml=(res.trainerNotes&&res.trainerNotes.length?sec("トレーナー向けサマリー","#43a047",trainerHtml):"")+(res.issues.length?sec("血液検査：各項目の分析","#66bb6a",issHtml):"")+planHtml;
  const footerHtml='<div style="margin-top:24px;padding:12px 14px;background:#e8f5e9;border-radius:10px;font-size:11px;color:#388e3c;line-height:1.7">このレポートは参考情報です。医療診断の代わりにはなりません。症状が続く場合は医師・専門家にご相談ください。</div>';
  const headHtml='<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>健康アドバイザー 結果レポート</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Hiragino Sans,sans-serif;background:white;padding:24px;color:#111827;font-size:14px;line-height:1.7;max-width:720px;margin:0 auto}h1{font-size:22px;font-weight:900;margin-bottom:4px}.header{border-bottom:2px solid #2e7d32;padding-bottom:16px;margin-bottom:20px}@media print{body{padding:10px}div{break-inside:avoid}}</style></head><body><div class="header"><div style="display:flex;align-items:center;gap:12px;margin-bottom:6px"><div style="width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#2e7d32,#43a047);display:flex;align-items:center;justify-content:center;font-size:20px;color:white">+</div><div><h1 style="color:#1b5e20">健康アドバイザー 結果レポート</h1><p style="color:#9ca3af;font-size:12px">'+date+'</p></div></div></div>';
  return headHtml+calHtml+summaryHtml+warnsHtml+sectionsHtml+footerHtml+'<script>window.onload=function(){window.print();}<\/script></body></html>';
}

// --- unified plan builder ---
function buildDietPlan(cv, bv, lv, ev, pv, res){
  // 入力値の解析
  const cw=parseFloat(cv.weight)||0;
  const gw=parseFloat(cv.goalWeight)||0;
  const weeks=parseInt(cv.weeks)||0;
  const hasDietGoal=cv.goalWeight&&cv.weeks&&cw>gw;
  const tdee=cv.height&&cv.weight&&cv.age&&cv.gender&&cv.activity
    ?calcTDEE(parseFloat(cv.height),cw,parseFloat(cv.age),cv.gender,cv.activity):null;

  const isFemale=cv.gender==="female";
  const highStress=parseInt(lv.stress)>=4;
  const poorSleep=lv.sleep==="5"||lv.sleep==="6"||lv.sleepQuality==="bad";
  const hasPMS=isFemale&&(pv.pms==="moderate"||pv.pms==="severe");
  const hasHeavyFlow=isFemale&&(pv.flowHeavy==="heavy"||pv.flowHeavy==="veryheavy");
  const isIrregular=isFemale&&(pv.cycleRegular==="irregular"||pv.cycleRegular==="noperiod");
  const hasHighGlucose=bv.glucose&&parseFloat(bv.glucose)>100;
  const hasLowHemo=bv.hemoglobin&&parseFloat(bv.hemoglobin)<13.5;
  const hasLowAST=bv.ast&&bv.alt&&parseFloat(bv.ast)<16&&parseFloat(bv.alt)<16;
  const hasHighTrig=bv.trig&&parseFloat(bv.trig)>150;
  const hasHighLDL=bv.ldl&&parseFloat(bv.ldl)>=100;
  const syms=lv.symptoms||[];
  const exIss=ev.issues||[];
  const mensSym=pv.mensSym||[];
  const hasMigraine=syms.includes("migraine");
  const hasFatigue=syms.includes("fatigue");
  const hasDizz=syms.includes("dizziness")||lv.dizziness==="yes";
  const hasMF=lv.morningFatigue==="yes";
  const noAnimal=lv.animal==="none"||lv.animal==="rare";
  const deskWork=ev.worktype==="desk";
  const slowRec=ev.recovery==="slow";
  const goalType=ev.goal;

  // 月別計画の月数（目標設定ありなら期間、なしは3ヶ月固定）
  const months=hasDietGoal?Math.ceil(weeks/4):3;
  const lossPerMonth=hasDietGoal?(cw-gw)/months:0;

  // 全フェーズ共通の「あなた固有の注意点」を収集
  function buildPersonalAlerts(){
    const alerts=[];
    if(hasLowHemo) alerts.push("鉄欠乏（Hb低値）: 酸素運搬能が低下しています。鉄補給を最優先に。高強度運動は貧血が改善してから段階的に。");
    if(hasHighGlucose) alerts.push("血糖値高め: 精製糖・清涼飲料水を除去。食後15〜30分のウォーキングを毎食後に習慣化。");
    if(hasHighTrig) alerts.push("中性脂肪高値: 果糖（ジュース・清涼飲料水）とアルコールが主犯。青魚（EPA/DHA）を週3〜4回に。");
    if(hasHighLDL) alerts.push("LDL高値: 飽和脂肪酸（バター・脂身）をオリーブ油・青魚に置き換え。水溶性食物繊維（オートミール・こんにゃく）を毎食に。");
    if(hasLowAST) alerts.push("消化吸収不全（AST/ALT低値）: よく噛む（一口20〜30回）+消化酵素サプリを食直前に。タンパク質が吸収されていない状態です。");
    if(highStress) alerts.push("ストレス高値: コルチゾール過剰→インスリン抵抗性→脂肪蓄積の連鎖が起きています。ストレス管理を並行して行ってください。");
    if(poorSleep) alerts.push("睡眠不足: グレリン（食欲増進）増加・レプチン（満腹）低下により過食しやすい状態です。睡眠の改善が最優先です。");
    if(hasLowHemo&&hasHeavyFlow) alerts.push("経血過多+鉄欠乏: 毎月の鉄喪失が大きい状態です。生理終了後の1〜2週間に鉄補給を集中させてください。");
    if(hasMigraine) alerts.push("片頭痛: 低血糖・睡眠不足・高強度運動が誘発因子。補食管理と血糖安定化を徹底してください。");
    if(hasFatigue) alerts.push("慢性疲労: 過負荷のリスクが高い状態です。回復を最優先に。副交感神経を優位にする習慣（呼吸法・入浴）を取り入れて。");
    if(hasMF) alerts.push("起床時疲労（副腎疲労）: 午前中の高強度運動は避け、朝食と日光浴を必ず行ってください。");
    if(deskWork) alerts.push("デスクワーク: 腸腰筋過緊張・大殿筋抑制が起きやすい。1時間に1回立ち上がり、ランチ後10分ウォーキングを習慣に。");
    if(exIss.includes("backpain")) alerts.push("腰痛あり: 高負荷種目（スクワット・デッドリフト）は痛みが改善してから。まず体幹安定化（ブリッジ・デッドバグ）を優先してください。");
    if(isIrregular) alerts.push("生理不順: 相対的エネルギー不足（RED-S）が原因の可能性があります。カロリー制限の程度とトレーニング量のバランスを必ず確認してください。");
    return alerts;
  }

  // フェーズ別のプラン生成
  const plans=[];
  for(let m=1;m<=months;m++){
    const startW=hasDietGoal?Math.round((cw-(lossPerMonth*(m-1)))*10)/10:cw;
    const endW=hasDietGoal?Math.max(Math.round((cw-(lossPerMonth*m))*10)/10,gw):cw;
    const targetKcal=hasDietGoal&&tdee?Math.round(tdee-(lossPerMonth*7200/28)):tdee||null;

    let phase,phaseColor,phaseBg;
    if(m===1){phase="[1] 基盤構築期";phaseColor="#2e7d32";phaseBg="#e8f5e9";}
    else if(m<=Math.ceil(months*0.5)){phase="[2] 脂肪燃焼・改善期";phaseColor="#f57f17";phaseBg="#fff9c4";}
    else if(m<months){phase="[3] 定着・代謝維持期";phaseColor="#0277bd";phaseBg="#e1f5fe";}
    else{phase="[4] 仕上げ・習慣化期";phaseColor="#1b5e20";phaseBg="#f1f8e9";}

    const diet=[], supps=[], life=[];

    // ─ 食事プラン（最重要3項目に絞る） ─
    const dietAll=[];
    if(targetKcal) dietAll.push("摂取カロリー "+targetKcal.toLocaleString()+" kcal/日。タンパク質 "+Math.round(cw*(m===1?1.6:1.9))+"g/日（毎食20〜30g）を最優先で確保");
    dietAll.push("ベジファースト: 野菜→タンパク→糖質の順で食べる（血糖スパイクを15〜20%抑制）");
    if(m===1) dietAll.push("糖質は最低100〜130g/日確保。過度な制限はホルモンバランスを乱す原因に");
    if(m>=2) dietAll.push("週1回リフィードデイ: その日だけTDEE（"+( tdee||"維持カロリー")+"kcal）まで食べる。停滞期対策として有効");
    if(hasHighGlucose) dietAll.push("甘い飲み物・精製糖を除去。食後すぐ15分歩く");
    if(hasLowHemo||noAnimal) dietAll.push("鉄補給: 赤身肉・あさり・小松菜を週3〜4回。お茶・コーヒーは食事中に飲まない");
    if(hasPMS&&m>=2) dietAll.push("生理前2週間: 食欲増加は正常。精製糖ではなくさつまいも・バナナ・玄米で対応");
    if(m>=months) dietAll.push("終了後: 毎週100〜150kcalずつ増やして維持カロリーへ（リバウンド防止）");
    diet.push(...dietAll.slice(0,3));

    // ─ サプリ（積み上げ式：継続+今月追加を明示） ─
    if(m===1){
      supps.push("[今月から] ビタミンD3 2000〜5000IU + K2 100µg（食事と一緒）");
      supps.push("[今月から] マグネシウム グリシン酸 200〜400mg（就寝前）");
      if(hasLowAST) supps.push("[今月から] 消化酵素（食直前）: AST/ALT低値のため吸収改善が最優先");
      else if(hasLowHemo) supps.push("[今月から] ヘム鉄サプリ（空腹時）: ヘモグロビン改善・エネルギー回復");
      else if(poorSleep) supps.push("[今月から] L-テアニン 100〜200mg（就寝前）: 睡眠の質を改善");
    } else if(m===2){
      supps.push("[継続] VitD3+K2 / マグネシウム");
      supps.push("[今月追加] オメガ3 EPA/DHA 2g（食事と一緒）: 炎症抑制・代謝適応を遅らせる");
      if(hasPMS||hasMigraine) supps.push("[今月追加] カルシウム 1000mg: PMS・片頭痛の予防");
      else supps.push("[今月追加] CoQ10 100〜200mg（食事と一緒）: ミトコンドリア機能を補助");
    } else if(m<months){
      supps.push("[継続] VitD3+K2 / マグネシウム / オメガ3");
      supps.push("[今月追加] アシュワガンダ KSM-66 300〜600mg（就寝前）: 長期ダイエットによるコルチゾール上昇を抑制");
      if(hasPMS) supps.push("[今月追加] ビタミンB6 50mg: 生理前のPMS・気分低下を軽減");
    } else {
      supps.push("[継続] VitD3+K2 / マグネシウム / オメガ3");
      supps.push("[今月追加] クレアチン 3〜5g/日: 筋肉量を維持してリバウンドを防ぐ");
      supps.push("[今月追加] プロテイン（運動後+就寝前）: 筋肉量維持が最優先");
    }
    supps.length=Math.min(supps.length,3);

    // ─ 生活習慣：月ごとに固定で異なる科学的根拠のある習慣 ─
    // 各月に割り当てる習慣プール（12種・毎月必ず違うものを提案）
    const habitPool = [
      // 1ヶ月目
      [
        "就寝・起床時間を毎日固定する（休日も±30分以内）: サーカディアンリズムを整えることで睡眠の質・代謝・ホルモンバランスが改善。複数のRCTで体重・血糖コントロールの改善を確認。",
        "毎食後15分ウォーキング: 食後すぐ歩くことで血糖スパイクを20〜30%抑制（複数のRCTで確認）。1日3回×15分＝45分の有酸素効果も得られる。",
        "就寝1時間前にスマホ・PCをオフにする: ブルーライトがメラトニン分泌を阻害。入眠潜時の短縮・睡眠効率向上が複数のRCTで確認されている。"
      ],
      // 2ヶ月目
      [
        "起床後すぐコップ1杯（200〜300ml）の水を飲む: 一晩の脱水を補い代謝を活性化。起立性低血圧の予防にも有効（立ちくらみ改善のRCTで確認）。",
        "4-7-8呼吸法を1日3回実施（4秒吸う→7秒止める→8秒吐く）: 副交感神経を即座に活性化しコルチゾールを低下させる。HRV（心拍変動）の改善がRCTで確認。",
        "入浴は38〜40℃のお湯に15分浸かる: シャワーではなく入浴で深部体温が上昇→その後の体温低下が睡眠を促進。睡眠の質向上がRCTで確認されている。"
      ],
      // 3ヶ月目
      [
        "起床後15分以内に日光を浴びる: コルチゾールの自然なピークを作りサーカディアンリズムを整える。セロトニン産生促進→夜のメラトニン分泌にも直結。",
        "毎食に発酵食品を1品取り入れる（みそ汁・納豆・ヨーグルトなど）: 腸内細菌叢の多様性を高め、SCFAの産生を促進。気分・免疫・代謝の改善がRCTで確認。",
        "食事中はスマホを置いて20分以上かけて食べる: 副交感神経が優位になり消化酵素の分泌が改善。満腹シグナルが正常化され過食を防ぐ（咀嚼RCTで確認）。"
      ],
      // 4ヶ月目以降はローテーション
      [
        "体重・ウエストを週3回同じ条件で計測する（起床後・排尿後）: セルフモニタリングが体重維持率を2倍以上高めることがコホート研究で確認。数値を見て微調整する習慣を。",
        "14時以降カフェインを摂らない: カフェインの半減期は5〜7時間。14時のカフェインが就寝時にも残り睡眠の質を低下させる。カフェインカットで睡眠効率が平均19分改善（RCT）。",
        "就寝前に今日の「良かったこと3つ」を書く（感謝日記）: ポジティブな振り返りがコルチゾールを低下させ睡眠の質を向上させることがRCTで確認。"
      ],
      [
        "起床後スクワット30回を習慣化する: 朝の筋収縮が骨格筋のGLUT4を活性化し、一日の血糖取り込み効率が向上。わずか5分の朝運動が血糖コントロールを改善（RCT）。",
        "補食はナッツ（一握り）またはチーズ＋ゆで卵に限定する: 脂質＋タンパク質の補食は血糖を安定させグレリン（食欲増進ホルモン）の上昇を抑制。精製糖の補食より満腹感が長続き（RCT）。",
        "入浴後10分のストレッチ（特に股関節・胸椎）: 体温が高い入浴後は筋肉が柔らかく伸びやすい。就寝前ストレッチが睡眠の質を向上させることがRCTで確認。"
      ],
    ];

    // 月番号に応じてインデックスを循環させる（必ず違うセットを提案）
    const habitSetIndex = (m - 1) % habitPool.length;
    const baseHabits = habitPool[habitSetIndex];

    // 個人の状態に応じた追加・差し替え
    const personalHabits = [];
    if(m===1&&poorSleep) personalHabits.push("【優先】就寝・起床時間の固定から始める: 睡眠不足の状態では他の習慣の効果が半減します。まず睡眠のリズムを整えることを最優先に。");
    if(m===1&&highStress) personalHabits.push("【優先】4-7-8呼吸法を毎朝・毎晩実施: ストレスが高い状態ではコルチゾール過剰により脂肪が蓄積しやすくなります。");
    if(m===1&&hasMF) personalHabits.push("【優先】起床後すぐ日光を浴びて朝食を食べる: 副腎疲労のある方は朝のルーティンを整えることが最重要です。");

    // 個人習慣がある場合は最初の1つと差し替え、なければbaseHabitsをそのまま使用
    if(personalHabits.length>0){
      life.push(personalHabits[0]);
      life.push(baseHabits[0]);
      life.push(baseHabits[1]);
    } else {
      life.push(...baseHabits);
    }

    const personalAlerts=m===1?buildPersonalAlerts():[];
    const warning=m===2&&hasDietGoal?"停滞期が来やすい時期です（体重の5%減少でホメオスタシスが作動）。焦らず戦略的に対処しましょう。":null;
    plans.push({month:m,phase,phaseColor,phaseBg,startWeight:startW,endWeight:endW,targetKcal,diet,supps,life,warning,personalAlerts});
  }
  return plans;
}

><span style={{color:"#f59e0b",fontWeight:700}}>⚠️ 1200kcal未満は健康リスクが高まる場合があります。医師・栄養士への相談をお勧めします。</span></>}</div><div style={{background:"#fffbeb",borderRadius:10,padding:"12px 14px",fontSize:13,color:"#78350f",lineHeight:1.8}}><span style={{fontWeight:700}}>推奨マクロ（{goalCalc.daily} kcal）</span><br/>タンパク質: {Math.round(parseFloat(cv.weight||60)*1.6)}g<br/>脂質: {Math.round(goalCalc.daily*0.25/9)}g<br/>糖質: {Math.round((goalCalc.daily-parseFloat(cv.weight||60)*1.6*4-goalCalc.daily*0.25)/4)}g</div></>)}</>)}</Card>)}
        </div>)}

        {step===2&&(<div className="fade"><Card style={{marginBottom:14}}>

                                <span style={{color:s.color,fontWeight:700,flexShrink:0}}>→</span>
                              )}
                              <span>{cleanItem}</span>
                            </div>
                          );
                        })}
                      </div>
                    ))}
                  </div>
                ))}
              </Sec>
            );
          })()}
          <div style={{background:"#e8f5e9",border:"1px solid #a5d6a7",borderRadius:14,padding:"14px 16px",fontSize:12,color:"#388e3c",lineHeight:1.7}}>このアドバイスは参考情報です。医療診断の代わりにはなりません。症状が続く場合は医師・専門家にご相談ください。</div>
        </div>)}
        </div>
      </div>

      {/* 固定フッターナビゲーション */}
      {step<6&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:"white",borderTop:"1px solid #e8f5e9",padding:"12px 16px",zIndex:100,boxShadow:"0 -4px 16px rgba(0,0,0,0.08)"}}>
          <div style={{maxWidth:480,margin:"0 auto",display:"flex",gap:10}}>
            {step===0&&(<>
              <button className="btn-s" style={{flex:1}} onClick={()=>goTo(1)}>スキップ</button>
              <button className="btn-p" style={{flex:2}} onClick={()=>goTo(1)} disabled={filled===0}>{filled===0?"数値を入力してください":"次へ：カロリー計算 →"}</button>
            </>)}
            {step>0&&step<5&&(<>
              <button className="btn-s" onClick={()=>goTo(step-1)}>← 戻る</button>
              <button className="btn-p" style={{flex:1}} onClick={()=>goTo(step+1)}>次へ →</button>
              {res&&<button onClick={finish} style={{padding:"15px 14px",borderRadius:14,border:"none",background:"linear-gradient(135deg,#43a047,#2e7d32)",color:"white",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap",boxShadow:"0 4px 12px rgba(67,160,71,0.35)"}}>再生成</button>}
            </>)}
            {step===5&&(<>
              <button className="btn-s" onClick={()=>goTo(step-1)}>← 戻る</button>
              <button className="btn-p" style={{flex:1}} onClick={finish}>アドバイスを生成する</button>
            </>)}
          </div>
        </div>
      )}
      {step===6&&res&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,background:"white",borderTop:"1px solid #e8f5e9",padding:"12px 16px",zIndex:100,boxShadow:"0 -4px 16px rgba(0,0,0,0.08)"}}>
          <div style={{maxWidth:480,margin:"0 auto",display:"flex",gap:10}}>
            <button className="btn-s" onClick={reset}>← 最初から</button>
            <button onClick={handlePrint} style={{flex:1,background:"linear-gradient(135deg,#43a047,#2e7d32)",color:"white",border:"none",borderRadius:14,padding:"15px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 4px 12px rgba(67,160,71,0.35)"}}>PDFで保存</button>
          </div>
        </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
